name: Deploy on Release

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest release into versioned folder
        run: |
          mkdir -p /home/dharshan/releases/${{ github.ref_name }}
          git -C /home/dharshan/ros2_purple fetch --tags
          git -C /home/dharshan/ros2_purple checkout -f ${{ github.ref_name }}
          cp -r /home/dharshan/ros2_purple/. /home/dharshan/releases/${{ github.ref_name }}/
          echo "Saved release ${{ github.ref_name }} to /home/dharshan/releases/${{ github.ref_name }}"

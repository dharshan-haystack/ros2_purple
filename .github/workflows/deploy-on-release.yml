name: Deploy on Release

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest release
        run: |
          cd /home/dharshan/ros2_purple
          git fetch --tags
          git checkout -f ${{ github.ref_name }}
          git clean -fd src
          echo "Deployed release ${{ github.ref_name }}"

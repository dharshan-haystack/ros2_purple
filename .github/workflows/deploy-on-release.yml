name: Deploy on Release

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into server and pull latest release
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/dharshan/ros2_purple
            git fetch --tags
            git checkout ${{ github.ref_name }}
            echo "✅ Deployed release: ${{ github.ref_name }}"

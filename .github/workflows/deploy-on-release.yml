name: Deploy on Release

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest release
        run: |
          cd /home/dharshan/ros2_purple
          git fetch --tags
          git checkout ${{ github.ref_name }}
          echo "✅ Deployed release: ${{ github.ref_name }}"
```

The key changes:
- `runs-on: ubuntu-latest` → `runs-on: self-hosted` (runs directly on your machine)
- Removed the `appleboy/ssh-action` step (no SSH needed anymore!)
